# SonarCloud Configuration
sonar.organization=city-of-helsinki
sonar.projectKey=City-of-Helsinki_haitaton-ui

# Source code configuration
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.tsx,src/**/*.test.ts,src/**/*.spec.tsx,src/**/*.spec.ts
sonar.exclusions=src/**/*.test.tsx,src/**/*.test.ts,src/**/*.spec.tsx,src/**/*.spec.ts

# Coverage exclusions
sonar.coverage.exclusions=\
  src/index.tsx,\
  src/serviceWorker.ts,\
  src/setupTests.ts,\
  src/jest.polyfills.js,\
  src/**/__mocks__/**,\
  src/**/mocks/**,\
  src/**/*.d.ts,\
  src/testUtils/**

# Language configuration
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Additional analysis exclusions
sonar.cpd.exclusions=src/**/*.d.ts
